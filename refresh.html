<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4CAF50" />
  <title>Refreshing Assamese App</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Outfit", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(145deg, #edf7ef 0%, #dbe9ff 100%);
      color: #123;
      padding: 18px;
    }
    .card {
      width: min(560px, 100%);
      background: #ffffff;
      border: 1px solid rgba(60, 90, 130, 0.2);
      border-radius: 18px;
      box-shadow: 0 14px 34px rgba(24, 38, 74, 0.14);
      padding: 18px;
      display: grid;
      gap: 10px;
    }
    h1 {
      margin: 0;
      font-size: 1.35rem;
    }
    p {
      margin: 0;
      line-height: 1.45;
    }
    .meta {
      color: #4d617c;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <article class="card">
    <h1>Refreshing App Cache...</h1>
    <p id="status">Please wait while old iPhone cache and service workers are removed.</p>
    <p class="meta">You will be redirected automatically to the latest version.</p>
  </article>

  <script>
    (async function hardRefreshAssameseApp() {
      const status = document.getElementById("status");
      const LATEST_URL = "./?v=20260715-179&cb=" + Date.now();

      try {
        if ("serviceWorker" in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        try {
          localStorage.removeItem("assamese-app-build-version");
          localStorage.removeItem("assamese-app-index-build");
        } catch (_e) {
          // Ignore storage errors.
        }

        status.textContent = "Cache cleared. Opening latest app...";
      } catch (_error) {
        status.textContent = "Cleanup partially completed. Opening latest app...";
      }

      setTimeout(() => {
        window.location.replace(LATEST_URL);
      }, 450);
    })();
  </script>
</body>
</html>
